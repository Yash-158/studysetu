product: { name: "StudySetu", tagline: "A Personalized Learning Platform for Every Student.", org: "StudySetu" }

# Design token system (docs/DESIGN.md is the authoritative write-up). Two switches, each a
# single value: active_palette picks one of 8 full color palettes; active_typography picks one
# of 2 font pairings. Nothing else in the app should ever read a hardcoded color or font -
# apps/web/src/lib/config.ts resolves these into CSS custom properties at boot.
branding:
  active_palette: palette_1
  active_typography: pairing_1
  logo: { path: "/brand/logo.png" }   # drop a real file here; falls back to a text wordmark until one exists

  # Shared across every palette (status colors carry the same meaning regardless of theme).
  # *_text variants are separately-contrast-checked darker shades for small colored TEXT on a
  # light tint (the .ss-status-pill pattern) - the raw success/warning/error swatches themselves
  # fail WCAG AA as text-on-near-white (checked: ~2.1-3.6:1); the *_text variants pass (4.8-6.2:1
  # against the lightest of the 8 backgrounds). Swatches stay usable as-is for icons/borders/tint
  # backgrounds, where contrast rules don't apply the same way.
  status:
    success: "#10B981"
    warning: "#F59E0B"
    error: "#EF4444"
    success_text: "#047857"
    warning_text: "#B45309"
    error_text: "#B91C1C"
    surface: "#FFFFFF"

  neutral_tracks:
    warm: { "900": "#1C1917", "700": "#44403C", "500": "#78716C", "300": "#D6D3D1", "200": "#E7E5E4", "100": "#F5F5F4" }
    cool: { "900": "#0F172A", "700": "#334155", "500": "#64748B", "300": "#CBD5E1", "200": "#E2E8F0", "100": "#F1F5F9" }

  # button_primary_bg is a component-level token, not always equal to primary: WCAG AA (4.5:1)
  # was checked for white text on every palette's primary; palette_6/7/8's primary fails
  # (3.68/4.47/2.77:1), so their button_primary_bg falls back to that same palette's OWN
  # secondary color (5.93-10.95:1) - no invented hex values, every color here was given.
  palettes:
    palette_1:
      name: "Academic Trust"
      colors: { primary: "#4F46E5", secondary: "#1E3A8A", accent: "#F59E0B", background: "#FAFAF9" }
      button_primary_bg: "#4F46E5"
      neutral_track: warm
      logo_colors: ["#4F46E5", "#F59E0B"]
    palette_2:
      name: "Terracotta Scholar"
      colors: { primary: "#3B5BDB", secondary: "#1A2E5C", accent: "#E8590C", background: "#FDFBF7" }
      button_primary_bg: "#3B5BDB"
      neutral_track: warm
      logo_colors: ["#3B5BDB", "#E8590C"]
    palette_3:
      name: "Forest Focus"
      colors: { primary: "#0F766E", secondary: "#134E4A", accent: "#65A30D", background: "#F7FDFB" }
      button_primary_bg: "#0F766E"
      neutral_track: cool
      logo_colors: ["#0F766E", "#65A30D"]
    palette_4:
      name: "Midnight Study"
      colors: { primary: "#1E3A8A", secondary: "#0F172A", accent: "#38BDF8", background: "#F8FAFC" }
      button_primary_bg: "#1E3A8A"
      neutral_track: cool
      logo_colors: ["#1E3A8A", "#38BDF8"]
    palette_5:
      name: "Coral Momentum"
      colors: { primary: "#2563EB", secondary: "#1E3A8A", accent: "#FB7185", background: "#FAFAFA" }
      button_primary_bg: "#2563EB"
      neutral_track: cool
      logo_colors: ["#2563EB", "#FB7185"]
    palette_6:
      name: "Slate Professional"
      colors: { primary: "#3B82F6", secondary: "#334155", accent: "#8B5CF6", background: "#F9FAFB" }
      button_primary_bg: "#334155"   # primary fails white-text AA (3.68:1) - falls back to secondary (10.35:1)
      neutral_track: cool
      logo_colors: ["#3B82F6", "#8B5CF6"]
    palette_7:
      name: "Violet Insight"
      colors: { primary: "#6366F1", secondary: "#4C1D95", accent: "#22D3EE", background: "#FAFAFF" }
      button_primary_bg: "#4C1D95"   # primary fails white-text AA (4.47:1) - falls back to secondary (10.95:1)
      neutral_track: cool
      logo_colors: ["#6366F1", "#22D3EE"]
    palette_8:
      name: "Sunrise Clarity"
      colors: { primary: "#0EA5E9", secondary: "#0369A1", accent: "#FB923C", background: "#F0F9FF" }
      button_primary_bg: "#0369A1"   # primary fails white-text AA (2.77:1) - falls back to secondary (5.93:1)
      neutral_track: cool
      logo_colors: ["#0EA5E9", "#FB923C"]

  typography:
    pairing_1:
      name: "Lexend + Space Grotesk"
      body: "Lexend"
      display: "Space Grotesk"
      google_fonts_url: "https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    pairing_2:
      name: "Karla + Fraunces"
      body: "Karla"
      display: "Fraunces"
      google_fonts_url: "https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap"

  spacing: { xs: "4px", sm: "8px", md: "16px", lg: "24px", xl: "32px", "2xl": "48px", "3xl": "64px" }
  radius: { sm: "8px", md: "12px", lg: "16px", full: "999px" }
  shadow:
    sm: "0 1px 2px rgba(0,0,0,0.06)"
    md: "0 1px 2px rgba(0,0,0,0.06), 0 1px 6px rgba(0,0,0,0.04)"
    lg: "0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04)"

features:
  explore: true
  explore_weekly_quota: 3
  typed_doubts: true
  self_serve_teacher_tier: true
  mentor_guidance: true
  # Phase 2 flags (built dark, flipped later)
  ocr: false
  offline_sync: false
  ai_pregrade: false
  syllabus_import: false
locales: { enabled: [en, hi], default: en }
