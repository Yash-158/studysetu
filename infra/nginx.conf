# Static site config for studysetu-web (see docker-compose.yml). SPA fallback: client-side routes
# like /student or /teacher must resolve to index.html, not a 404, on a hard reload.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri /index.html;
    }
}
