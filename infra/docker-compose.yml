# PRODUCTION stack (droplet, /home/deploy/studysetu). Image tag injected by CI.
# HTTPS/reverse-proxy is a SEPARATE shared layer across every caffeineclause project on this droplet
# (see ../caffeineclause-edge repo, docs/ARCHITECTURE.md ADR-011). This stack never binds 80/443; it
# only joins the external "edge" Docker network (created once by infra/droplet-bootstrap.sh) so the
# shared Caddy can reach it by container name.
name: studysetu
services:
  api:
    image: ghcr.io/yash-158/studysetu-api:${TAG:-latest}
    container_name: studysetu-api
    env_file: [.env]
    environment: { APP_CONFIG_DIR: /srv/config }
    volumes: [uploads_data:/data/uploads]
    depends_on: { postgres: { condition: service_healthy } }
    networks: [edge, default]
    restart: unless-stopped
  postgres:
    image: pgvector/pgvector:pg16
    container_name: studysetu-postgres
    environment: { POSTGRES_USER: app, POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}", POSTGRES_DB: appdb }
    volumes: [pg_data:/var/lib/postgresql/data, backups_data:/backups]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U app -d appdb"], interval: 5s, retries: 10 }
    restart: unless-stopped
    # NO ports, NOT on "edge": Postgres reachable only on this project's own network (verify_server.sh enforces).
networks:
  edge:
    external: true
  default: {}
volumes: { pg_data: {}, uploads_data: {}, backups_data: {} }
