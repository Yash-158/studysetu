# PRODUCTION stack (droplet, /home/deploy/app). Image tag injected by CI.
name: studysetu
services:
  api:
    image: ghcr.io/GITHUB_OWNER/studysetu-api:${TAG:-latest}
    env_file: [.env]
    environment: { APP_CONFIG_DIR: /srv/config }
    volumes: [uploads_data:/data/uploads]
    depends_on: { postgres: { condition: service_healthy } }
    restart: unless-stopped
  postgres:
    image: pgvector/pgvector:pg16
    environment: { POSTGRES_USER: app, POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}", POSTGRES_DB: appdb }
    volumes: [pg_data:/var/lib/postgresql/data, backups_data:/backups]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U app -d appdb"], interval: 5s, retries: 10 }
    restart: unless-stopped
    # NO ports: Postgres reachable only on the compose network (verify_server.sh enforces).
  caddy:
    image: caddy:2
    ports: ["80:80", "443:443"]
    volumes: ["./Caddyfile:/etc/caddy/Caddyfile:ro", "./site:/srv/site:ro", caddy_data:/data]
    restart: unless-stopped
volumes: { pg_data: {}, uploads_data: {}, backups_data: {}, caddy_data: {} }
