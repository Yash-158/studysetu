name: deploy
on: { push: { branches: [main] } }
concurrency: production
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.lc }}/studysetu-api:${{ github.sha }}
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: apps/web/pnpm-lock.yaml }
      - name: Build web
        run: |
          cd apps/web
          pnpm install --no-frozen-lockfile
          pnpm build
          mv dist ../../site   # stage at repo root: source: "site/*" + strip_components: 1 below
                                # lands flat (index.html directly, no nested dist/) - mirrors the
                                # documented distfiles/* pattern rather than guessing path depth
                                # through apps/web/dist/*.
      - name: Ship web build to droplet ./site
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "site/*"
          target: /home/deploy/studysetu/site
          strip_components: 1
      - name: Ship nginx config to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: infra/nginx.conf
          target: /home/deploy/studysetu
          strip_components: 1
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /home/deploy/studysetu
            export TAG=${{ github.sha }}
            bash deploy.sh
