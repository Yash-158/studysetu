name: ci
on: { pull_request: {}, push: { branches: [main] } }
jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: { POSTGRES_USER: app, POSTGRES_PASSWORD: ci, POSTGRES_DB: appdb }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app" --health-interval 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://app:ci@localhost:5432/appdb
      JWT_SECRET: ci-test-secret
      # config/storage.yaml's production default (/data/uploads) is a container volume path the
      # runner has no permission to create at filesystem root - same class of gotcha as bare-metal
      # local dev (see .env.example), fixed the same way: an APP__ override to a writable path.
      APP__storage__upload_dir: /tmp/studysetu-uploads
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: DATABASE_URL=postgresql://app:ci@localhost:5432/appdb bash scripts/migrate.sh
      - run: cd apps/api && uv sync --all-groups
      - run: cd apps/api && uv run ruff check app
      - run: cd apps/api && APP_CONFIG_DIR=../../config uv run pytest -q
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: apps/web/pnpm-lock.yaml }
      - run: cd apps/web && pnpm install --no-frozen-lockfile
      - run: cd apps/web && pnpm typecheck
      - run: cd apps/web && pnpm run test --passWithNoTests
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: { POSTGRES_USER: app, POSTGRES_PASSWORD: ci, POSTGRES_DB: appdb }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app" --health-interval 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - run: DATABASE_URL=postgresql://app:ci@localhost:5432/appdb bash scripts/migrate.sh
